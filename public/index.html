<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Token Bleed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-token-bleed">
        Token <span class="bleed-word">Bleed</span>
      </div>
      <nav>
        <div class="nav-section-label">Overview</div>
        <a class="nav-item" data-view="overview" href="#overview">
          <span class="nav-icon">◈</span> Overview
        </a>

        <div class="nav-section-label">Data</div>
        <a class="nav-item" data-view="projects" href="#projects">
          <span class="nav-icon">⬡</span> Projects
        </a>
        <a class="nav-item" data-view="sessions" href="#sessions">
          <span class="nav-icon">◎</span> Sessions
        </a>

        <div class="nav-section-label">Analysis</div>
        <a class="nav-item" data-view="comparison" href="#comparison">
          <span class="nav-icon">⟷</span> Model Compare
        </a>
        <a class="nav-item" data-view="session-compare" href="#session-compare">
          <span class="nav-icon">⇄</span> Session Compare
        </a>
        <a class="nav-item" data-view="prompt-compare" href="#prompt-compare">
          <span class="nav-icon">≋</span> Prompt Compare
        </a>
        <a class="nav-item" data-view="tips" href="#tips">
          <span class="nav-icon">✦</span> Tips
        </a>

        <div class="nav-section-label">Config</div>
        <a class="nav-item" data-view="settings" href="#settings">
          <span class="nav-icon">⚙</span> Settings
        </a>
      </nav>

      <div class="sidebar-footer">
        <button id="refresh-btn" class="refresh-btn" title="Refresh data">↺ Refresh</button>
        <button id="about-btn" class="about-btn" title="About Token Bleed">? About</button>
        <div class="sidebar-credits">
          <a class="sidebar-credits-club" href="https://airevenueclub.com" target="_blank" rel="noopener"><span class="club-ai">AI</span> <span class="club-revenue">Revenue</span> <span class="club-club">Club</span></a>
          <a class="sidebar-credits-handle" href="https://youtube.com/@MrRichSylvester" target="_blank" rel="noopener">@MrRichSylvester</a>
        </div>
      </div>
    </aside>

    <div id="main">
      <header id="header">
        <div class="header-left"></div>
        <div class="header-right" style="display:flex;align-items:center;gap:20px;">
          <div id="period-selector"></div>
          <div class="share-wrap" id="share-wrap">
          <button class="header-share-btn" id="header-share-btn" title="Share Token Bleed">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="13" cy="3" r="2" stroke="currentColor" stroke-width="1.4"/><circle cx="3" cy="8" r="2" stroke="currentColor" stroke-width="1.4"/><circle cx="13" cy="13" r="2" stroke="currentColor" stroke-width="1.4"/><line x1="4.9" y1="7" x2="11.1" y2="4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="4.9" y1="9" x2="11.1" y2="12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            Share
          </button>
          <div class="share-dropdown" id="share-dropdown" hidden>
            <a class="share-dropdown-item" id="share-x" href="#" target="_blank" rel="noopener">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.748l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.911-5.622Zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
              Share on X
            </a>
            <a class="share-dropdown-item" id="share-li" href="#" target="_blank" rel="noopener">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
              Share on LinkedIn
            </a>
            <button class="share-dropdown-item" id="share-copy">
              <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><rect x="5" y="5" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M11 5V3.5A1.5 1.5 0 0 0 9.5 2h-6A1.5 1.5 0 0 0 2 3.5v6A1.5 1.5 0 0 0 3.5 11H5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
              Copy link
            </button>
          </div>
          </div>
          <div class="appr-wrap" id="appr-wrap">
            <button class="appr-btn" id="appr-btn" title="Appearance">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="8" cy="8" r="7" fill="currentColor" opacity="0.15"/>
                <path d="M8 1 A7 7 0 0 1 8 15 Z" fill="currentColor" opacity="0.9"/>
                <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.25" opacity="0.5"/>
                <line x1="8" y1="1" x2="8" y2="15" stroke="currentColor" stroke-width="1" opacity="0.4"/>
              </svg>
            </button>
            <div class="appr-panel" id="appr-panel" hidden>
              <div class="appr-section">
                <span class="appr-label">Theme</span>
                <div class="appr-opts" id="theme-opts">
                  <button class="appr-opt" data-theme="dark" title="Dark">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    Dark
                  </button>
                  <button class="appr-opt" data-theme="light" title="Light">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2"/><line x1="12" y1="1" x2="12" y2="3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="12" y1="21" x2="12" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="1" y1="12" x2="3" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="21" y1="12" x2="23" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                    Light
                  </button>
                </div>
              </div>
              <div class="appr-divider"></div>
              <div class="appr-section">
                <span class="appr-label">Text size</span>
                <div class="appr-opts" id="size-opts">
                  <button class="appr-opt" data-size="small" title="Small"><span class="appr-size-icon" style="font-size:10px">A</span>Small</button>
                  <button class="appr-opt" data-size="medium" title="Medium"><span class="appr-size-icon" style="font-size:13px">A</span>Medium</button>
                  <button class="appr-opt" data-size="large" title="Large"><span class="appr-size-icon" style="font-size:16px">A</span>Large</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </header>

      <div id="content">
        <div class="loading-state">
          <div class="spinner"></div>
          <p>Loading sessions...</p>
        </div>
      </div>
    </div>
  </div>

  <div id="prompt-modal" class="prompt-modal-overlay" hidden>
    <div class="prompt-modal">
      <div class="prompt-modal-header">
        <span class="prompt-modal-title">Full Prompt</span>
        <button id="prompt-modal-close" class="prompt-modal-close">✕</button>
      </div>
      <pre id="prompt-modal-body" class="prompt-modal-body"></pre>
    </div>
  </div>

  <script src="app.js" type="module"></script>
</body>

</html>

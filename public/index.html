<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Token Bleed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-club-brand">
        <span class="club-ai">AI</span> <span class="club-revenue">Revenue</span> <span class="club-club">Club</span>
      </div>
      <nav>
        <div class="nav-section-label">Overview</div>
        <a class="nav-item" data-view="overview" href="#overview">
          <span class="nav-icon">◈</span> Overview
        </a>

        <div class="nav-section-label">Data</div>
        <a class="nav-item" data-view="projects" href="#projects">
          <span class="nav-icon">⬡</span> Projects
        </a>
        <a class="nav-item" data-view="sessions" href="#sessions">
          <span class="nav-icon">◎</span> Sessions
        </a>

        <div class="nav-section-label">Analysis</div>
        <a class="nav-item" data-view="comparison" href="#comparison">
          <span class="nav-icon">⟷</span> Model Comparison
        </a>
        <a class="nav-item" data-view="session-compare" href="#session-compare">
          <span class="nav-icon">⇄</span> Session Compare
        </a>
      </nav>

      <div class="sidebar-footer">
        <button id="refresh-btn" class="refresh-btn" title="Refresh data">↺ Refresh</button>
      </div>
    </aside>

    <div id="main">
      <header id="header">
        <div class="header-left">
          <div class="header-logo-row">
            <span class="header-brand token-bleed-logo">Token <span class="bleed-word">Bleed</span></span>
          </div>
        </div>
        <div class="header-right" style="display:flex;align-items:center;gap:20px;">
          <div id="period-selector"></div>
          <span class="header-byline">Built by @MrRichSylvester</span>
        </div>
      </header>

      <div id="content">
        <div class="loading-state">
          <div class="spinner"></div>
          <p>Loading sessions...</p>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js" type="module"></script>
</body>
</html>
